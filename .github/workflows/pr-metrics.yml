name: PR Metrics Dashboard
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: read
jobs:
  metrics:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/pulls?state=closed&per_page=100" --jq '[.[]|select(.merged_at!=null)]' > prs.json
          TOTAL=$(jq 'length' prs.json)
          jq -r '.[]|(.merged_at|strptime("%Y-%m-%dT%H:%M:%SZ")|mktime)-(.created_at|strptime("%Y-%m-%dT%H:%M:%SZ")|mktime)' prs.json|sort -n > ct.txt
          COUNT=$(wc -l < ct.txt|tr -d ' ')
          if [ "$COUNT" -gt 0 ]; then
            MI=$(((COUNT-1)/2))
            PI=$(python3 -c "import math;print(min(int(math.ceil(${COUNT}*0.85))-1,${COUNT}-1))")
            MEDIAN=$(python3 -c "print(round($(sed -n '$((MI+1))p' ct.txt)/60,1))")
            P85=$(python3 -c "print(round($(sed -n '$((PI+1))p' ct.txt)/60,1))")
          else
            MEDIAN=n/a; P85=n/a
          fi
          REVIEWED=0; UNREV=""; ROWS=""; TI=0
          while IFS= read -r n; do
            A=$(jq -r --argjson n "$n" '.[]|select(.number==$n)|.user.login' prs.json)
            T=$(jq -r --argjson n "$n" '.[]|select(.number==$n)|.title' prs.json)
            R=$(gh api "repos/${REPO}/pulls/${n}/reviews" --jq "[.[]|select(.user.login!="${A}" and .state!="COMMENTED")]|length")
            C=$(gh api "repos/${REPO}/pulls/${n}/commits" --jq length)
            I=$(python3 -c "print(max(1,${C}-1))")
            TI=$((TI+I))
            ROWS="${ROWS}| #${n} | ${T} | ${I} |\n"
            [ "$R" -gt 0 ] && REVIEWED=$((REVIEWED+1)) || UNREV="${UNREV}\n- #${n}: ${T}"
          done < <(jq -r '.[].number' prs.json)
          [ "$TOTAL" -gt 0 ] && RATE=$(python3 -c "print(f'{round(${REVIEWED}/${TOTAL}*100,1)}%')") || RATE=n/a
          [ "$TOTAL" -gt 0 ] && AVG=$(python3 -c "print(round(${TI}/${TOTAL},1))") || AVG=n/a
          SINCE=$(date -u -d '28 days ago' +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null||date -u -v-28d +"%Y-%m-%dT%H:%M:%SZ")
          gh api "repos/${REPO}/commits?sha=main&per_page=100&since=${SINCE}" --jq '.[]|{a:(.author.login//.commit.author.name),d:.commit.author.date}' > rc.json
          mkdir -p docs
          python3 << 'PYEOF'
import json,os
from collections import defaultdict
from datetime import datetime
prs=json.load(open('prs.json'))
try: rc=[json.loads(l) for l in open('rc.json') if l.strip()]
except: rc=[]
w=defaultdict(lambda:defaultdict(int))
for c in rc:
  dt=datetime.strptime(c['d'],'%Y-%m-%dT%H:%M:%SZ')
  w[c['a']][dt.strftime('%Y-W%V')]+=1
freq='| Author | Week | Commits |\n|---|---|---|'
if w:
  freq+='\n'+'\n'.join(f'| {a} | {wk} | {cnt} |' for a,weeks in sorted(w.items()) for wk,cnt in sorted(weeks.items()))
else:
  freq+='\n| — | — | no data |'
unrev=os.environ.get('UNREV','').replace('\\n','\n').strip() or '✅ None'
rows=os.environ.get('ROWS','').replace('\\n','\n').strip()
md=f"""# 📊 Engineering Flow Metrics Dashboard
> Last updated: **{os.environ['TS']}** | {os.environ['TOTAL']} merged PRs analysed
---
## Summary
| Metric | Value |
|---|---|
| PR Cycle Time Median | {os.environ['MEDIAN']} min |
| PR Cycle Time p85 | {os.environ['P85']} min |
| Review Participation | {os.environ['RATE']} ({os.environ['REVIEWED']}/{os.environ['TOTAL']}) |
| PR Iteration Avg | {os.environ['AVG']} |
---
## PR Cycle Time
Median: **{os.environ['MEDIAN']} min** | p85: **{os.environ['P85']} min**
> Median > 60 min = watch. > 480 min = act.
---
## Review Participation
Rate: **{os.environ['RATE']}**
PRs without peer review:
{unrev}
> Target 100%. Solo repo always shows 0% until collaborators join.
---
## PR Iteration Count
Average: **{os.environ['AVG']}** iterations per PR
| PR | Title | Iterations |
|---|---|---|
{rows}
> Average > 3 = spec ambiguity or insufficient upfront design.
---
## Commit Frequency (last 28 days)
{freq}
> Sudden drop = blocker signal. Not a productivity measure.
---
*Generated by pr-metrics.yml*"""
open('docs/pr-metrics.md','w').write(md)
print('Dashboard written.')
PYEOF
          cat docs/pr-metrics.md
        env:
          TS: $(date -u +"%Y-%m-%d %H:%M UTC")
          MEDIAN: $MEDIAN
          P85: $P85
          RATE: $RATE
          AVG: $AVG
          TOTAL: $TOTAL
          REVIEWED: $REVIEWED
          UNREV: $UNREV
          ROWS: $ROWS
      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pr-metrics.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: update PR metrics dashboard [skip ci]"
          git push origin HEAD:main
