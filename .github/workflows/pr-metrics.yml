name: PR Metrics Dashboard

on:
  pull_request:
      types: [closed]
        workflow_dispatch:

        permissions:
          contents: write
            pull-requests: read

            jobs:
              update-metrics:
                  if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
                      runs-on: ubuntu-latest
                          steps:
                                - name: Checkout repository
                                        uses: actions/checkout@v4

                                              - name: Compute PR metrics and write dashboard
                                                      env:
                                                                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                          REPO: ${{ github.repository }}
                                                                                  run: |
                                                                                            set -euo pipefail

                                                                                                      # ── Fetch all merged PRs ──────────────────────────────────────
                                                                                                                gh api "repos/${REPO}/pulls?state=closed&per_page=100" \
                                                                                                                            --jq '[.[] | select(.merged_at != null)]' > merged_prs.json
                                                                                                                            
                                                                                                                                      TOTAL=$(jq 'length' merged_prs.json)
                                                                                                                                                echo "Merged PRs: ${TOTAL}"
                                                                                                                                                
                                                                                                                                                          # ── 1. PR Cycle Time ──────────────────────────────────────────
                                                                                                                                                                    jq -r '.[] | (.merged_at | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)
                                                                                                                                                                                         - (.created_at | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)' \
                                                                                                                                                                                                     merged_prs.json | sort -n > cycle_times.txt
                                                                                                                                                                                                     
                                                                                                                                                                                                               COUNT=$(wc -l < cycle_times.txt | tr -d ' ')
                                                                                                                                                                                                                         if [ "$COUNT" -gt 0 ]; then
                                                                                                                                                                                                                                     MEDIAN_IDX=$(( (COUNT - 1) / 2 ))
                                                                                                                                                                                                                                                 P85_IDX=$(python3 -c "import math; print(min(int(math.ceil(${COUNT}*0.85))-1,${COUNT}-1))")
                                                                                                                                                                                                                                                             MEDIAN_SEC=$(sed -n "$((MEDIAN_IDX+1))p" cycle_times.txt)
                                                                                                                                                                                                                                                                         P85_SEC=$(sed -n "$((P85_IDX+1))p" cycle_times.txt)
                                                                                                                                                                                                                                                                                     MEDIAN_MIN=$(python3 -c "print(round(${MEDIAN_SEC}/60,1))")
                                                                                                                                                                                                                                                                                                 P85_MIN=$(python3 -c "print(round(${P85_SEC}/60,1))")
                                                                                                                                                                                                                                                                                                           else
                                                                                                                                                                                                                                                                                                                       MEDIAN_MIN="n/a"; P85_MIN="n/a"
                                                                                                                                                                                                                                                                                                                                 fi
                                                                                                                                                                                                                                                                                                                                 
                                                                                                                                                                                                                                                                                                                                           # ── 2. Review Participation Rate ──────────────────────────────
                                                                                                                                                                                                                                                                                                                                                     REVIEWED=0; UNREVIEWED_LIST=""
                                                                                                                                                                                                                                                                                                                                                               while IFS= read -r pr_num; do
                                                                                                                                                                                                                                                                                                                                                                           AUTHOR=$(jq -r --argjson n "$pr_num" '.[]|select(.number==$n)|.user.login' merged_prs.json)
                                                                                                                                                                                                                                                                                                                                                                                       RCNT=$(gh api "repos/${REPO}/pulls/${pr_num}/reviews" \
                                                                                                                                                                                                                                                                                                                                                                                                     --jq "[.[]|select(.user.login!=\"${AUTHOR}\" and .state!=\"COMMENTED\")]|length")
                                                                                                                                                                                                                                                                                                                                                                                                                 TITLE=$(jq -r --argjson n "$pr_num" '.[]|select(.number==$n)|.title' merged_prs.json)
                                                                                                                                                                                                                                                                                                                                                                                                                             if [ "$RCNT" -gt 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                           REVIEWED=$((REVIEWED+1))
                                                                                                                                                                                                                                                                                                                                                                                                                                                       else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                     UNREVIEWED_LIST="${UNREVIEWED_LIST}\n- #${pr_num} — ${TITLE}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           done < <(jq -r '.[].number' merged_prs.json)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     if [ "$TOTAL" -gt 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 REVIEW_RATE=$(python3 -c "print(f'{round(${REVIEWED}/${TOTAL}*100,1)}%')")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       REVIEW_RATE="n/a"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           # ── 3. PR Iteration Count ──────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     TOTAL_ITERS=0; PR_ITER_ROWS=""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               while IFS= read -r pr_num; do
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           CC=$(gh api "repos/${REPO}/pulls/${pr_num}/commits" --jq 'length')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       IT=$(python3 -c "print(max(1,${CC}-1))")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   TT=$(jq -r --argjson n "$pr_num" '.[]|select(.number==$n)|.title' merged_prs.json)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               TOTAL_ITERS=$((TOTAL_ITERS+IT))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           PR_ITER_ROWS="${PR_ITER_ROWS}| #${pr_num} | ${TT} | ${IT} |\n"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     done < <(jq -r '.[].number' merged_prs.json)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               if [ "$TOTAL" -gt 0 ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           AVG_ITERS=$(python3 -c "print(round(${TOTAL_ITERS}/${TOTAL},1))")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 AVG_ITERS="n/a"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     # ── 4. Commit Frequency (last 28 days) ────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               SINCE=$(date -u -d '28 days ago' +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 date -u -v-28d +"%Y-%m-%dT%H:%M:%SZ")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           gh api "repos/${REPO}/commits?sha=main&per_page=100&since=${SINCE}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       --jq '.[]|{author:(.author.login//.commit.author.name),date:.commit.author.date}' \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   > recent_commits.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             FREQ_TABLE=$(python3 - <<'PY'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       import json, sys
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 from collections import defaultdict
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           from datetime import datetime
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     try:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 with open("recent_commits.json") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               data = [json.loads(l) for l in f if l.strip()]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         except Exception:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     data = []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               if not data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           print("| Author | Week | Commits |\n|---|---|---|\n| — | — | no data |")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       sys.exit(0)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 weekly = defaultdict(lambda: defaultdict(int))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           for c in data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       dt = datetime.strptime(c["date"], "%Y-%m-%dT%H:%M:%SZ")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   weekly[c["author"]][dt.strftime("%Y-W%V")] += 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             rows = []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       for author, weeks in sorted(weekly.items()):
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   for wk, cnt in sorted(weeks.items()):
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 rows.append(f"| {author} | {wk} | {cnt} |")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           print("| Author | Week | Commits |\n|---|---|---|")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     print("\n".join(rows))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               PY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   # ── Build dashboard markdown ───────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             UPDATED=$(date -u +"%Y-%m-%d %H:%M UTC")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       SC="🟢"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 SR="🔴"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           [ "$REVIEWED" -eq "$TOTAL" ] 2>/dev/null && SR="🟢" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     [ "$REVIEW_RATE" = "n/a" ] && SR="⚪"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               mkdir -p docs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo "# 📊 Engineering Flow Metrics Dashboard"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       echo "> Auto-generated by the \`PR Metrics Dashboard\` GitHub Action on every PR merge."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 echo "> Last updated: **${UPDATED}**"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     echo "---"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         echo "## Summary"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo "| Metric | Value | Signal |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       echo "|---|---|---|"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 echo "| PR Cycle Time — Median | ${MEDIAN_MIN} min | ${SC} |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           echo "| PR Cycle Time — 85th Percentile | ${P85_MIN} min | ${SC} |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     echo "| Review Participation Rate | ${REVIEW_RATE} | ${SR} |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               echo "| PR Iteration Count — Avg | ${AVG_ITERS} | ℹ️ |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         echo "| Total Merged PRs analysed | ${TOTAL} | — |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo "---"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 echo "## 1. PR Cycle Time"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     echo "| Percentile | Value |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               echo "|---|---|"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         echo "| Median (p50) | ${MEDIAN_MIN} min |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo "| 85th percentile (p85) | ${P85_MIN} min |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       echo "> Median > 60 min = 🟡 watch. Median > 480 min = 🔴 act."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           echo "---"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               echo "## 2. Review Participation Rate"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo "**Rate: ${REVIEW_RATE}** (${REVIEWED} of ${TOTAL} PRs reviewed by a peer)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       echo "**PRs merged without peer review:**"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if [ -z "$UNREVIEWED_LIST" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo "✅ None — all PRs were reviewed."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   printf '%b\n' "$UNREVIEWED_LIST"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 echo "> Target: 100%. On a solo repo this is always 0% — activates when collaborators join."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     echo "---"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         echo "## 3. PR Iteration Count"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             echo "**Average: ${AVG_ITERS} iterations per PR**"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 echo "| PR | Title | Iterations |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           echo "|---|---|---|"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     printf '%b' "$PR_ITER_ROWS"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               echo ""
