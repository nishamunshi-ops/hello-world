name: PR Metrics Dashboard
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: read
jobs:
  metrics:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute metrics dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/pulls?state=closed&per_page=100" --jq '[.[]|select(.merged_at!=null)]' > prs.json
          TOTAL=$(jq length prs.json)
          jq -r '.[]|(.merged_at|strptime("%Y-%m-%dT%H:%M:%SZ")|mktime)-(.created_at|strptime("%Y-%m-%dT%H:%M:%SZ")|mktime)' prs.json|sort -n > ct.txt
          COUNT=$(wc -l < ct.txt|tr -d ' ')
          if [ "$COUNT" -gt 0 ]; then
            MI=$(((COUNT-1)/2))
            PI=$(python3 -c "import math;print(min(int(math.ceil(${COUNT}*0.85))-1,${COUNT}-1))")
            MEDIAN=$(python3 -c "print(round($(sed -n '$((MI+1))p' ct.txt)/60,1))")
            P85=$(python3 -c "print(round($(sed -n '$((PI+1))p' ct.txt)/60,1))")
          else
            MEDIAN=n/a
            P85=n/a
          fi
          REVIEWED=0
          UNREV=""
          ROWS=""
          TI=0
          while IFS= read -r n; do
            A=$(jq -r --argjson n "$n" '.[]|select(.number==$n)|.user.login' prs.json)
            T=$(jq -r --argjson n "$n" '.[]|select(.number==$n)|.title' prs.json)
            R=$(gh api "repos/${REPO}/pulls/${n}/reviews" --jq "[.[]|select(.user.login!="${A}" and .state!="COMMENTED")]|length")
            C=$(gh api "repos/${REPO}/pulls/${n}/commits" --jq length)
            I=$(python3 -c "print(max(1,${C}-1))")
            TI=$((TI+I))
            ROWS="${ROWS}| #${n} | ${T} | ${I} |\n"
            [ "$R" -gt 0 ] && REVIEWED=$((REVIEWED+1)) || UNREV="${UNREV}\n- #${n}: ${T}"
          done < <(jq -r '.[].number' prs.json)
          [ "$TOTAL" -gt 0 ] && RATE=$(python3 -c "print(f'{round(${REVIEWED}/${TOTAL}*100,1)}%')") || RATE=n/a
          [ "$TOTAL" -gt 0 ] && AVG=$(python3 -c "print(round(${TI}/${TOTAL},1))") || AVG=n/a
          SINCE=$(date -u -d '28 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null||date -u -v-28d +%Y-%m-%dT%H:%M:%SZ)
          gh api "repos/${REPO}/commits?sha=main&per_page=100&since=${SINCE}" --jq '.[]|{a:(.author.login//.commit.author.name),d:.commit.author.date}' > rc.json
          SR=X
          [ "$REVIEWED" -eq "$TOTAL" ] 2>/dev/null && SR=OK || true
          [ "$RATE" = n/a ] && SR=SOLO
          TS=$(date -u +"%Y-%m-%d %H:%M UTC")
          mkdir -p docs
          echo '' | base64 -d > make_dashboard.py
          SR="$SR" TS="$TS" MEDIAN="$MEDIAN" P85="$P85" RATE="$RATE" AVG="$AVG" TOTAL="$TOTAL" REVIEWED="$REVIEWED" UNREV="$UNREV" ROWS="$ROWS" python3 make_dashboard.py
          cat docs/pr-metrics.md
      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pr-metrics.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: update PR metrics dashboard [skip ci]"
          git push origin HEAD:main
